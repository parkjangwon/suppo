services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: suppo
      POSTGRES_USER: suppo
      POSTGRES_PASSWORD: suppo_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suppo -d suppo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
