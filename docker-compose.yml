services:
  sqld:
    image: ghcr.io/tursodatabase/libsql-server:latest
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/sqld
    environment:
      SQLD_NODE: primary
      SQLD_HTTP_LISTEN_ADDR: "0.0.0.0:8889"
    expose:
      - "8889"   # 내부 네트워크 전용 — ports로 외부 노출 금지
    # 주의: LibSQL alpine 이미지에는 wget/curl이 없어 헬스체크 비활성화

  migrate:
    image: crinity-helpdesk:latest
    restart: "no"
    depends_on:
      - sqld
    environment:
      DATABASE_URL: http://sqld:8889
    entrypoint: ["node", "scripts/migrate.mjs"]

  public:
    image: crinity-helpdesk:latest
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      APP_TYPE: public
      DATABASE_URL: http://sqld:8889
      PUBLIC_URL: ${PUBLIC_URL}
      ADMIN_URL: ${ADMIN_URL}
      AUTH_URL: ${PUBLIC_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      TICKET_ACCESS_SECRET: ${TICKET_ACCESS_SECRET}
      GIT_TOKEN_ENCRYPTION_KEY: ${GIT_TOKEN_ENCRYPTION_KEY}
    volumes:
      - uploads:/app/public/uploads
    expose:
      - "3000"
    # 수평 확장: docker-compose up --scale public=3

  admin:
    image: crinity-helpdesk:latest
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      APP_TYPE: admin
      DATABASE_URL: http://sqld:8889
      PUBLIC_URL: ${PUBLIC_URL}
      ADMIN_URL: ${ADMIN_URL}
      AUTH_URL: ${ADMIN_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      TICKET_ACCESS_SECRET: ${TICKET_ACCESS_SECRET}
      GIT_TOKEN_ENCRYPTION_KEY: ${GIT_TOKEN_ENCRYPTION_KEY}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
    volumes:
      - uploads:/app/public/uploads
    expose:
      - "3000"
    # 수평 확장: docker-compose up --scale admin=2

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - public
      - admin

  # 테스트용: admin 컨테이너 포트 노출
  admin-test:
    extends:
      service: admin
    ports:
      - "3003:3000"
    profiles:
      - test

volumes:
  db_data:
  uploads:
