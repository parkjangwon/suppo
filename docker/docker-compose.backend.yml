services:
  sqld:
    image: ghcr.io/tursodatabase/libsql-server:latest
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/sqld
    environment:
      SQLD_NODE: primary
      SQLD_HTTP_LISTEN_ADDR: "0.0.0.0:8889"
    expose:
      - "8889"

  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: migrator
    restart: "no"
    depends_on:
      - sqld
    environment:
      DATABASE_URL: http://sqld:8889
      DATABASE_AUTH_TOKEN: ${DATABASE_AUTH_TOKEN:-}

  bootstrap:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: migrator
    restart: "no"
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["pnpm", "--filter=@suppo/db", "bootstrap"]
    environment:
      DATABASE_URL: http://sqld:8889
      DATABASE_AUTH_TOKEN: ${DATABASE_AUTH_TOKEN:-}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
      AUTO_BOOTSTRAP: ${AUTO_BOOTSTRAP:-if-empty}
      SEED_PROFILE: ${SEED_PROFILE:-none}

  public:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runner
      args:
        APP_NAME: public
    image: suppo-public:latest
    restart: unless-stopped
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: http://sqld:8889
      DATABASE_AUTH_TOKEN: ${DATABASE_AUTH_TOKEN:-}
      PUBLIC_URL: ${PUBLIC_URL}
      ADMIN_URL: ${ADMIN_URL}
      AUTH_URL: ${PUBLIC_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      TICKET_ACCESS_SECRET: ${TICKET_ACCESS_SECRET}
      GIT_TOKEN_ENCRYPTION_KEY: ${GIT_TOKEN_ENCRYPTION_KEY}
    volumes:
      - uploads:/app/apps/public/public/uploads
    ports:
      - "${BACKEND_BIND_IP:-127.0.0.1}:${PUBLIC_APP_PORT:-3000}:3000"

  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runner
      args:
        APP_NAME: admin
    image: suppo-admin:latest
    restart: unless-stopped
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: http://sqld:8889
      DATABASE_AUTH_TOKEN: ${DATABASE_AUTH_TOKEN:-}
      PUBLIC_URL: ${PUBLIC_URL}
      ADMIN_URL: ${ADMIN_URL}
      AUTH_URL: ${ADMIN_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      TICKET_ACCESS_SECRET: ${TICKET_ACCESS_SECRET}
      GIT_TOKEN_ENCRYPTION_KEY: ${GIT_TOKEN_ENCRYPTION_KEY}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
    volumes:
      - uploads:/app/apps/admin/public/uploads
    ports:
      - "${BACKEND_BIND_IP:-127.0.0.1}:${ADMIN_APP_PORT:-3001}:3000"

volumes:
  db_data:
  uploads:
