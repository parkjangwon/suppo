services:
  sqld:
    image: ghcr.io/tursodatabase/libsql-server:latest
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/sqld
    environment:
      SQLD_NODE: primary
      SQLD_HTTP_LISTEN_ADDR: "0.0.0.0:8889"
    expose:
      - "8889"

  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: migrator
    restart: "no"
    depends_on:
      - sqld
    environment:
      DATABASE_URL: http://sqld:8889

  public:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runner
      args:
        APP_NAME: public
    image: crinity-public:latest
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: http://sqld:8889
      PUBLIC_URL: ${PUBLIC_URL}
      ADMIN_URL: ${ADMIN_URL}
      AUTH_URL: ${PUBLIC_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      TICKET_ACCESS_SECRET: ${TICKET_ACCESS_SECRET}
      GIT_TOKEN_ENCRYPTION_KEY: ${GIT_TOKEN_ENCRYPTION_KEY}
    volumes:
      - uploads:/app/apps/public/public/uploads
    expose:
      - "3000"

  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runner
      args:
        APP_NAME: admin
    image: crinity-admin:latest
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: http://sqld:8889
      PUBLIC_URL: ${PUBLIC_URL}
      ADMIN_URL: ${ADMIN_URL}
      AUTH_URL: ${ADMIN_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      TICKET_ACCESS_SECRET: ${TICKET_ACCESS_SECRET}
      GIT_TOKEN_ENCRYPTION_KEY: ${GIT_TOKEN_ENCRYPTION_KEY}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
    volumes:
      - uploads:/app/apps/admin/public/uploads
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:${NGINX_HTTP_PORT:-80}"
      - "${NGINX_HTTPS_PORT:-443}:${NGINX_HTTPS_PORT:-443}"
    environment:
      PUBLIC_URL: ${PUBLIC_URL}
      ADMIN_URL: ${ADMIN_URL}
      PUBLIC_SERVER_NAME: ${PUBLIC_SERVER_NAME:-}
      ADMIN_SERVER_NAME: ${ADMIN_SERVER_NAME:-}
      PUBLIC_CLIENT_MAX_BODY_SIZE: ${PUBLIC_CLIENT_MAX_BODY_SIZE:-600M}
      ADMIN_CLIENT_MAX_BODY_SIZE: ${ADMIN_CLIENT_MAX_BODY_SIZE:-100M}
      ENABLE_TLS: ${ENABLE_TLS:-0}
      NGINX_HTTP_PORT: ${NGINX_HTTP_PORT:-80}
      NGINX_HTTPS_PORT: ${NGINX_HTTPS_PORT:-443}
      PUBLIC_TLS_CERT: ${PUBLIC_TLS_CERT:-/etc/nginx/certs/public.crt}
      PUBLIC_TLS_KEY: ${PUBLIC_TLS_KEY:-/etc/nginx/certs/public.key}
      ADMIN_TLS_CERT: ${ADMIN_TLS_CERT:-/etc/nginx/certs/admin.crt}
      ADMIN_TLS_KEY: ${ADMIN_TLS_KEY:-/etc/nginx/certs/admin.key}
    volumes:
      - ./nginx.entrypoint.sh:/docker-entrypoint.d/99-render-nginx.sh:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - public
      - admin
    command:
      - /bin/sh
      - /docker-entrypoint.d/99-render-nginx.sh

volumes:
  db_data:
  uploads:
